name: Build Phase 3 Static Libraries (Experimental)

on:
  workflow_dispatch:
    inputs:
      faiss_version:
        description: 'FAISS version tag (e.g., v1.13.2)'
        required: true
        default: 'v1.13.2'
      platform:
        description: 'Platform to build (single platform for testing)'
        required: true
        default: 'linux-amd64'
        type: choice
        options:
          - linux-amd64
          - linux-arm64
          - windows-amd64

# Phase 3 builds attempt to merge runtime libraries for ZERO dependencies
# This is experimental - if it fails, fall back to standard unified builds

jobs:
  build-phase3:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - platform: linux-amd64
            os: ubuntu-latest
            setup_qemu: false
          - platform: linux-arm64
            os: ubuntu-latest
            setup_qemu: true
          - platform: windows-amd64
            os: windows-latest
            setup_qemu: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (ARM64 only)
        if: matrix.setup_qemu
        uses: docker/setup-qemu-action@v3

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            git \
            gfortran \
            gcc \
            g++ \
            binutils

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y
          choco install mingw -y

      # Cache OpenBLAS with static runtime libs
      - name: Cache OpenBLAS (Phase 3)
        id: cache-openblas-static
        uses: actions/cache@v4
        with:
          path: tmp/openblas-static-${{ matrix.platform }}
          key: openblas-phase3-${{ matrix.platform }}-v0.3.30-${{ hashFiles('scripts/build_unified_static.sh') }}
          restore-keys: |
            openblas-phase3-${{ matrix.platform }}-v0.3.30-

      - name: Build Phase 3 unified library
        run: |
          chmod +x scripts/build_unified_static.sh
          ./scripts/build_unified_static.sh ${{ matrix.platform }} ${{ github.event.inputs.faiss_version }}

      - name: Verify Phase 3 build
        run: |
          chmod +x scripts/verify_phase3.sh
          ./scripts/verify_phase3.sh ${{ matrix.platform }} || true

      - name: Library information
        run: |
          echo "=== Built Library Info ==="
          ls -lh libs/${{ matrix.platform//-/_}}/
          file libs/${{ matrix.platform//-/_}}/libfaiss.a

          echo ""
          echo "=== Size Comparison ==="
          echo "Phase 3 goal: 50-60MB (all deps merged)"
          echo "Standard unified: 45MB (OpenBLAS merged only)"
          echo "Standard: 9MB (no OpenBLAS)"

          echo ""
          echo "=== Build Info ==="
          cat libs/${{ matrix.platform//-/_}}/build_info.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: faiss-phase3-${{ matrix.platform }}
          path: libs/${{ matrix.platform//-/_}}/
          retention-days: 30

      - name: Test linking (Linux)
        if: runner.os == 'Linux' && matrix.platform == 'linux-amd64'
        run: |
          # Try to build a simple Go program with Phase 3 flags
          cat > test_phase3.go <<'EOF'
          //go:build faiss_phase3
          package main

          import "C"

          func main() {
              println("Phase 3 link test")
          }
          EOF

          echo "Attempting to link with Phase 3 flags (no runtime libs)..."
          if CGO_ENABLED=1 \
             CGO_LDFLAGS="-L./libs/linux_amd64 -lfaiss -lm -lpthread -ldl" \
             go build -tags=faiss_phase3 test_phase3.go; then
            echo "✓ SUCCESS! Phase 3 worked - ZERO runtime dependencies!"
            echo "phase3_success=true" >> $GITHUB_OUTPUT
          else
            echo "✗ FAILED - Phase 3 needs refinement, runtime deps still required"
            echo "phase3_success=false" >> $GITHUB_OUTPUT
          fi

          rm -f test_phase3.go test_phase3

  summary:
    needs: build-phase3
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Phase 3 Build Summary
        run: |
          echo "========================================="
          echo "Phase 3 Experimental Build Complete"
          echo "========================================="
          echo ""
          echo "Phase 3 attempts to create truly self-contained"
          echo "static libraries by merging runtime libs:"
          echo "  - libgfortran.a"
          echo "  - libgomp.a"
          echo "  - libquadmath.a"
          echo ""
          echo "If successful: ZERO external dependencies"
          echo "If failed: Use standard unified builds (minimal deps)"
          echo ""
          echo "Check the verification output above to see results."
